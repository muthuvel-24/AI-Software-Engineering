services:
  - type: web
    name: ai-engineering-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # Build JDBC URL from individual DB components (not connectionString)
      - key: DB_HOST
        fromDatabase:
          name: ai-assistant-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ai-assistant-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ai-assistant-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ai-assistant-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ai-assistant-db
          property: password
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: ai-assistant-db
    plan: free
    databaseName: ai_assistant
