services:
  # Spring Boot Backend — Docker deployment
  - type: web
    name: ai-engineering-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: ai-assistant-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: ai-assistant-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ai-assistant-db
          property: password
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  # Free PostgreSQL database
  - name: ai-assistant-db
    plan: free
    databaseName: ai_assistant
