spring.application.name=AIEngineeringAssistant
server.port=8080

# ─── PostgreSQL Database ───────────────────────────────────────────────────────
# Render provides DB_HOST, DB_PORT, DB_NAME as individual env vars
# This constructs a proper jdbc:postgresql:// URL automatically
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_assistant}}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:muthuvel2004}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:aiSoftwareEngineeringAssistantSecretKeyForJWTSigning1234567890}
jwt.expiration.ms=86400000

# ─── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false

# ─── Spring Security ───────────────────────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin

# ─── AI Provider Keys (set via environment variables) ──────────────────────────
# Do NOT put real API keys here. Set OPENROUTER_API_KEY in Render env vars.
openrouter.api.key=${OPENROUTER_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
