spring.application.name=AIEngineeringAssistant
server.port=8080

# PostgreSQL Database (set via environment variables)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_assistant}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:aiSoftwareEngineeringAssistantSecretKeyForJWTSigning1234567890}
jwt.expiration.ms=86400000

# Jackson config
spring.jackson.serialization.fail-on-empty-beans=false

# Spring Security default user
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin}

# AI Provider API Keys (set via environment variables — do NOT hardcode here)
# Set OPENROUTER_API_KEY in your system environment or .env file
openrouter.api.key=${OPENROUTER_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
